name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["FX Discovery"]   # Runs after discovery pipeline completes
    types: [completed]

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm deps
        run: npm install

      - name: Build dashboard
        run: npm run build

      - name: Copy data files into build
        run: |
          mkdir -p dist/data
          cp data/events.json dist/data/events.json
          cp data/leads.json  dist/data/leads.json

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
