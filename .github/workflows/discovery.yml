name: FX Discovery

on:
  schedule:
    - cron: "0 6 * * 1-5"   # Mon-Fri 6am UTC
  workflow_dispatch:          # Manual trigger from GitHub Actions tab

permissions:
  contents: write             # Needed to commit data files back to repo

jobs:
  discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingest.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL }}
          DISCOVERY_MAX_EVENTS: "8"
        run: python scripts/ingest.py

      - name: Run discover.py
        env:
          COMPANIES_HOUSE_API_KEY:        ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          DISCOVERY_MAX_SEARCH_TERMS:     "5"
          DISCOVERY_MAX_COMPANIES_PER_TERM: "8"
        run: python scripts/discover.py

      - name: Copy data files to public folder for dashboard
        run: |
          mkdir -p public/data
          cp data/events.json public/data/events.json
          cp data/leads.json  public/data/leads.json

      - name: Commit updated data files
        run: |
          git config user.name  "FX Discovery Bot"
          git config user.email "bot@universalpartners"
          git add data/events.json data/leads.json public/data/events.json public/data/leads.json
          git diff --staged --quiet || git commit -m "chore: update discovery data $(date -u +'%Y-%m-%d %H:%M') UTC"
          git push
